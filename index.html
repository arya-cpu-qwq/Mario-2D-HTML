<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Geometric Bros - Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #5c94fa; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; background: #5c94fa; }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .pointer-events-auto { pointer-events: auto; }
        .pixel-border { border: 4px solid #fff; box-shadow: 6px 6px 0px rgba(0,0,0,0.8); }
        .game-overlay {
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .btn-mario {
            background: #e74c3c; color: white; cursor: pointer;
            border-bottom: 6px solid #c0392b; transition: all 0.1s;
        }
        .btn-mario:active { border-bottom-width: 0px; transform: translateY(6px); }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- Menu Awal -->
    <div id="start-screen" class="game-overlay fixed inset-0 pointer-events-auto">
        <h1 class="text-white text-3xl md:text-5xl mb-8 text-center leading-tight">
            SUPER<br><span class="text-yellow-400">GEOMETRIC</span><br>BROS
        </h1>
        <div class="bg-blue-600 p-8 pixel-border flex flex-col gap-4">
            <button id="start-btn" class="btn-mario py-4 px-10 text-lg uppercase">
                MAIN SEKARANG
            </button>
        </div>
        <p class="text-white text-[10px] mt-8 uppercase text-center">PANAH / WASD: GERAK<br>SPACE: LOMPAT</p>
    </div>

    <!-- UI Permainan -->
    <div id="game-ui" class="hidden p-6 flex justify-between w-full text-white">
        <div>
            <div class="text-[10px] text-yellow-400">PEMAIN</div>
            <div class="text-xl mt-1" id="ui-name">MARIO</div>
            <div class="text-lg" id="current-score">000000</div>
        </div>
        <div class="text-center">
            <div class="text-[10px] text-yellow-400">KOIN</div>
            <div class="text-xl mt-1">O x <span id="coin-count">0</span></div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over" class="game-overlay fixed inset-0 pointer-events-auto hidden">
        <h2 class="text-white text-4xl mb-6">KALAH!</h2>
        <button onclick="location.reload()" class="btn-mario py-4 px-12 uppercase">
            COBA LAGI
        </button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * Logika Game Mario Sederhana & Stabil
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'START';
let score = 0;
let coins = 0;
let cameraX = 0;
let frameCount = 0;
let keys = {};

const player = {
    x: 100, y: 0, w: 32, h: 44,
    vx: 0, vy: 0,
    grounded: false,
    facing: 1,
    moving: false
};

let mapObjects = [];
let collectibles = [];
let enemies = [];

// Fungsi Mulai
function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height - 150;
    
    mapObjects = [];
    collectibles = [];
    enemies = [];
    
    // Tanah Utama
    mapObjects.push({ x: 0, y: canvas.height - 80, w: 5000, h: 80, type: 'ground' });
    
    // Rintangan (Pipa & Bata)
    for(let i = 400; i < 4500; i += 400) {
        // Bata
        mapObjects.push({ x: i + 100, y: canvas.height - 250, w: 40, h: 40, type: 'brick' });
        mapObjects.push({ x: i + 140, y: canvas.height - 250, w: 40, h: 40, type: 'question' });
        mapObjects.push({ x: i + 180, y: canvas.height - 250, w: 40, h: 40, type: 'brick' });
        
        // Koin di atas bata
        collectibles.push({ x: i + 145, y: canvas.height - 290, w: 30, h: 30, collected: false });

        // Pipa
        if(Math.random() > 0.5) {
            mapObjects.push({ x: i + 500, y: canvas.height - 160, w: 60, h: 80, type: 'pipe' });
        }

        // Musuh
        enemies.push({ x: i + 300, y: canvas.height - 112, w: 32, h: 32, vx: -2, range: 150, startX: i + 300, dead: false });
    }
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    if(player.facing === -1) {
        ctx.scale(-1, 1);
        ctx.translate(-player.w, 0);
    }

    const walk = player.moving ? Math.sin(frameCount * 0.2) * 5 : 0;

    // Kaki
    ctx.fillStyle = "#5d4037";
    ctx.fillRect(2, 34 + walk, 12, 10);
    ctx.fillRect(18, 34 - walk, 12, 10);

    // Baju Overall Biru
    ctx.fillStyle = "#2980b9";
    ctx.fillRect(4, 14, 24, 22);
    
    // Kancing Kuning
    ctx.fillStyle = "#f1c40f";
    ctx.fillRect(8, 20, 4, 4);
    ctx.fillRect(20, 20, 4, 4);

    // Lengan Merah
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(0, 16, 8, 12);

    // Kepala & Kumis
    ctx.fillStyle = "#ffdbac";
    ctx.fillRect(6, -4, 20, 20);
    ctx.fillStyle = "black";
    ctx.fillRect(18, 2, 4, 4); // Mata
    ctx.fillRect(16, 10, 10, 4); // Kumis

    // Topi
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(4, -8, 24, 8);
    ctx.fillStyle = "white";
    ctx.fillRect(12, -7, 8, 4);

    ctx.restore();
}

function update() {
    if(gameState !== 'PLAYING') return;
    frameCount++;

    player.moving = false;
    if(keys['ArrowLeft'] || keys['KeyA']) {
        player.vx = -5;
        player.facing = -1;
        player.moving = true;
    } else if(keys['ArrowRight'] || keys['KeyD']) {
        player.vx = 5;
        player.facing = 1;
        player.moving = true;
    } else {
        player.vx *= 0.8;
    }

    if((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
        player.vy = -15;
        player.grounded = false;
    }

    player.vy += 0.8; // Gravitasi
    player.x += player.vx;
    player.y += player.vy;

    // Tabrakan
    let onGround = false;
    mapObjects.forEach(obj => {
        if(player.x < obj.x + obj.w && player.x + player.w > obj.x &&
           player.y < obj.y + obj.h && player.y + player.h > obj.y) {
            
            // Jatuh di atas objek
            if(player.vy > 0 && player.y + player.h - player.vy <= obj.y + 10) {
                player.y = obj.y - player.h;
                player.vy = 0;
                onGround = true;
            } 
            // Benturan samping
            else {
                if(player.vx > 0) player.x = obj.x - player.w;
                else if(player.vx < 0) player.x = obj.x + obj.w;
            }
        }
    });
    player.grounded = onGround;

    // Koin
    collectibles.forEach(c => {
        if(!c.collected && player.x < c.x + c.w && player.x + player.w > c.x &&
           player.y < c.y + c.h && player.y + player.h > c.y) {
            c.collected = true;
            score += 100;
            coins++;
            document.getElementById('current-score').innerText = score.toString().padStart(6, '0');
            document.getElementById('coin-count').innerText = coins;
        }
    });

    // Musuh
    enemies.forEach(e => {
        if(e.dead) return;
        e.x += e.vx;
        if(Math.abs(e.x - e.startX) > e.range) e.vx *= -1;

        if(player.x < e.x + e.w && player.x + player.w > e.x &&
           player.y < e.y + e.h && player.y + player.h > e.y) {
            // Injak musuh
            if(player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
                e.dead = true;
                player.vy = -10;
                score += 500;
            } else {
                gameState = 'GAMEOVER';
                document.getElementById('game-over').classList.remove('hidden');
            }
        }
    });

    if(player.y > canvas.height) {
        gameState = 'GAMEOVER';
        document.getElementById('game-over').classList.remove('hidden');
    }

    // Kamera
    cameraX = player.x - canvas.width / 4;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Gambar Objek
    mapObjects.forEach(obj => {
        if(obj.type === 'ground') {
            ctx.fillStyle = "#ab5233";
            ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(obj.x, obj.y, obj.w, 10);
        } else if(obj.type === 'pipe') {
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else {
            ctx.fillStyle = obj.type === 'brick' ? "#e67e22" : "#f1c40f";
            ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        }
    });

    // Gambar Koin
    ctx.fillStyle = "#f1c40f";
    collectibles.forEach(c => {
        if(!c.collected) {
            ctx.beginPath();
            ctx.arc(c.x + 15, c.y + 15, 10, 0, Math.PI*2);
            ctx.fill();
        }
    });

    // Gambar Musuh
    ctx.fillStyle = "#c0392b";
    enemies.forEach(e => {
        if(!e.dead) {
            ctx.fillRect(e.x, e.y, e.w, e.h);
            ctx.fillStyle = "white";
            ctx.fillRect(e.x + 5, e.y + 5, 5, 5);
            ctx.fillRect(e.x + 22, e.y + 5, 5, 5);
            ctx.fillStyle = "#c0392b";
        }
    });

    drawPlayer();
    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Event Listeners
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
document.getElementById('start-btn').onclick = () => {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    gameState = 'PLAYING';
};

window.onresize = init;
init();
loop();
</script>
</body>
</html>
